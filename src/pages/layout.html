<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{TITLE}}</title>
  <meta name="description" content="BLT-Zero — Zero-trust vulnerability reporting platform" />
  <meta name="theme-color" content="#111827" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#dc2626',
            'primary-dark': '#b91c1c',
            'neutral-border': '#e5e7eb',
            'dark-base': '#111827',
            'dark-surface': '#1F2937'
          },
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace']
          }
        }
      }
    };
  </script>
  <style>
    body { 
      font-family: 'Inter', system-ui, sans-serif;
    }
    .dark body {
      background-color: #111827;
      color: #f9fafb;
    }
    body {
      background-color: #f9fafb;
      color: #111827;
    }
    .text-balance { text-wrap: balance; }
    .text-pretty { text-wrap: pretty; }
  </style>
  {{TURNSTILE_SCRIPT}}
</head>
<body class="font-sans antialiased">

  <!-- NAVBAR -->
  <header class="sticky top-0 z-50 border-b border-gray-200 dark:border-gray-700 bg-white/80 dark:bg-dark-base/80 backdrop-blur-sm">
    <nav class="mx-auto flex h-14 max-w-5xl items-center justify-between px-6">
      <div class="flex items-center gap-2">
        <img src="/logo.png" alt="BLT-Zero Logo" class="h-6 w-6" />
        <span class="text-sm font-semibold tracking-tight text-gray-900 dark:text-gray-50">BLT-Zero</span>
      </div>
      <div class="flex items-center gap-1">
        <button id="themeToggle" class="inline-flex h-9 w-9 items-center justify-center rounded-md hover:bg-gray-100 dark:hover:bg-dark-surface text-gray-700 dark:text-gray-300 transition-colors" aria-label="Toggle theme">
          <svg id="sunIcon" class="hidden h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/>
          </svg>
          <svg id="moonIcon" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>
          </svg>
        </button>
        <a href="https://github.com/OWASP-BLT/BLT-Zero" target="_blank" rel="noopener noreferrer"
           class="inline-flex h-9 items-center justify-center gap-2 rounded-md border border-gray-200 dark:border-gray-700 bg-white dark:bg-dark-base px-3 text-sm font-medium text-gray-700 dark:text-gray-300 transition-colors hover:bg-gray-100 dark:hover:bg-dark-surface">
          <svg class="h-4 w-4" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
          <span class="hidden sm:inline">Contribute</span>
        </a>
      </div>
    </nav>
  </header>

  <main>
    {{BODY}}
  </main>

  <!-- FOOTER -->
  <footer class="border-t border-gray-200 dark:border-gray-700 px-6 py-8 mt-20">
    <div class="mx-auto flex max-w-5xl flex-col items-center justify-between gap-4 sm:flex-row">
      <p class="text-xs text-gray-600 dark:text-gray-400">Built for the OWASP community.</p>
      <a href="https://github.com/OWASP-BLT/BLT-Zero" target="_blank" rel="noopener noreferrer"
         class="text-xs text-gray-600 dark:text-gray-400 underline-offset-4 transition-colors hover:text-gray-900 dark:hover:text-gray-50 hover:underline">
        github.com/OWASP-BLT/BLT-Zero
      </a>
    </div>
  </footer>

  <!-- Theme toggle script -->
  <script>
    const html = document.documentElement;
    const toggle = document.getElementById('themeToggle');
    const sunIcon = document.getElementById('sunIcon');
    const moonIcon = document.getElementById('moonIcon');

    function updateIcons() {
      const isDark = html.classList.contains('dark');
      sunIcon.classList.toggle('hidden', !isDark);
      moonIcon.classList.toggle('hidden', isDark);
      document.querySelector('meta[name="theme-color"]')
        ?.setAttribute('content', isDark ? '#111827' : '#f9fafb');
    }

    const stored = localStorage.getItem('theme');
    if (stored === 'light') {
      html.classList.remove('dark');
    } else if (stored === 'dark') {
      html.classList.add('dark');
    } else if (!window.matchMedia('(prefers-color-scheme: dark)').matches) {
      html.classList.remove('dark');
    }
    updateIcons();

    toggle.addEventListener('click', () => {
      html.classList.toggle('dark');
      localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
      updateIcons();
    });
  </script>

</body>
</html>
