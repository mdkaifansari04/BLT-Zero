name = "blt-zero"
main = "src/worker.ts"
compatibility_date = "2026-02-19"

[vars]
APP_ORIGIN = "https://zero.blt.owasp.org"
MAIN_BLT_API_URL = "https://blt.owasp.org"
POINTS_AWARD = "3"
MAX_UPLOAD_BYTES = "3145728" # 3 MiB encrypted package cap
RATE_LIMIT_PER_MINUTE = "5"

EMAIL_PROVIDER = "mailchannels" # or "sendgrid"
DISABLE_TURNSTILE = "true"
TURNSTILE_SITE_KEY = "REPLACE_ME"

# Admin onboarding page protection (set as secrets ideally)
# ADMIN_TOKEN: long random string; used for /admin/onboard POST auth

[[d1_databases]]
binding = "DB"
database_name = "blt_zero"
database_id = "replace id here"